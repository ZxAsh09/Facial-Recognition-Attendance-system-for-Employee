<!DOCTYPE html>
<html>
<head>
    <title>Register Employee</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h1>ATTENDANCE<br>SYSTEM</h1>

    <a href="/">Dashboard</a>
    <a href="/attendance">Take Attendance</a>
    <a href="/register">Register Employee</a>
    <a href="/admin">Admin Panel</a>
    <a href="/reports">Reports</a>
    <a href="/settings">Settings</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

    <div class="header">
        <h2>Register Employee</h2>
        <p>Add New Employee Face Data</p>
    </div>

    <div class="table-box">

        <form method="POST" action="/save_register">

            <input
                type="text"
                name="emp_id"
                placeholder="Enter Employee ID"
                required
            >

            <br><br>

            <input
                type="text"
                name="emp_name"
                placeholder="Enter Employee Name"
                required
            >

            <br><br>

            <button type="submit">
                Start Registration
            </button>

        </form>

    </div>

</div>

</body>
</html>
